name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: 📦 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: 🔍 Vérifier l'environnement
        run: |
          node -v
          npm -v

      - name: 📥 Installer les dépendances
        run: npm ci

      - name: 🔍 Vérifier Capacitor
        run: |
          npm list @capacitor/cli
          ls node_modules/@capacitor

      - name: 🏗️ Build Vite
        run: npm run build

      - name: 📱 Capacitor Sync
        run: ./node_modules/.bin/cap sync android

      - name: 🔨 Build APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DYNO-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk